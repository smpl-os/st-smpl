name: Release

# Triggers on version tags: v1.2.3
# To release: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build st-smpl
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --needed git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            libx11 libxft libxrandr \
            harfbuzz \
            imlib2

      - name: Build
        run: make

      - name: Strip binary
        run: strip st

      - name: Rename for release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp st st-smpl-${VERSION}-x86_64
          echo "BIN=st-smpl-${VERSION}-x86_64" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "st-smpl v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            ${{ env.BIN }}
